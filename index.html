<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uteservering i solen – Malmö</title>
  <meta name="description" content="Se vilka uteserveringar i Malmö som har sol just nu, med hänsyn till skuggor från byggnader." />
  <meta name="theme-color" content="#f0a31a" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Var skiner solen just nu i Malmö?" />
  <meta property="og:description" content="Se vilka uteserveringar i Malmö som har sol just nu, med hänsyn till skuggor från byggnader." />
  <meta property="og:image" content="https://fredaspba.github.io/uteservering-sol/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://fredaspba.github.io/uteservering-sol/" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="app-header">
    <p class="eyebrow">Ett soltest för Malmös uteserveringar</p>
    <h1>Var skiner solen just nu?</h1>
    <p class="subtitle">
      Solens vinkel skiftar med tid på dygnet och årstid — och byggnaderna runt varje
      uteservering avgör om den faktiskt når fram. Välj tid och se vem som får sol.
    </p>
  </header>

  <div id="controls">
    <label>
      <span class="control-label">Datum</span>
      <input type="date" id="date-input" />
    </label>
    <label class="time-label">
      <span class="control-label">Tid</span>
      <input type="range" id="time-slider" min="0" max="1439" step="5" />
      <span id="time-display">--:--</span>
    </label>
    <button id="now-button">Nu</button>
  </div>

  <div id="search-row">
    <label class="search-label">
      <span class="control-label">Sök</span>
      <input type="search" id="search-input" placeholder="t.ex. Spoonery, Pickwick…" list="terrace-names" autocomplete="off" />
      <datalist id="terrace-names"></datalist>
    </label>
    <button type="button" id="near-me-button">📍 Närmast mig med sol</button>
    <span id="search-status"></span>
  </div>

  <div id="map"></div>

  <div id="legend">
    <div class="chip">
      <svg class="status-icon icon-sun" viewBox="0 0 16 16" aria-hidden="true">
        <circle cx="8" cy="8" r="3.2" fill="currentColor" />
        <g stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
          <line x1="8" y1="1" x2="8" y2="2.6" />
          <line x1="8" y1="13.4" x2="8" y2="15" />
          <line x1="1" y1="8" x2="2.6" y2="8" />
          <line x1="13.4" y1="8" x2="15" y2="8" />
          <line x1="2.9" y1="2.9" x2="4" y2="4" />
          <line x1="12" y1="12" x2="13.1" y2="13.1" />
          <line x1="13.1" y1="2.9" x2="12" y2="4" />
          <line x1="4" y1="12" x2="2.9" y2="13.1" />
        </g>
      </svg>
      Sol
    </div>
    <div class="chip">
      <svg class="status-icon icon-leaf" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M2 13 C2 6 7 2 14 2 C14 9 10 13 3.5 13 Z" fill="currentColor" />
        <path d="M3 12.5 C6 9 9 6 13 2.5" stroke="var(--color-surface)" stroke-width="0.9" fill="none" stroke-linecap="round" />
      </svg>
      Skugga
    </div>
    <div class="chip">
      <svg class="status-icon icon-moon" viewBox="0 0 16 16" aria-hidden="true">
        <circle cx="8" cy="8" r="6" fill="currentColor" />
        <circle cx="11" cy="6" r="5" fill="var(--color-bg)" />
      </svg>
      Mörkt
    </div>
    <div class="chip">
      <svg class="status-icon icon-alert" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 1.5 L15 14.5 L1 14.5 Z" fill="currentColor" />
        <rect x="7.35" y="6" width="1.3" height="4.2" rx="0.6" fill="var(--color-surface)" />
        <circle cx="8" cy="12" r="0.9" fill="var(--color-surface)" />
      </svg>
      Osäker data
    </div>
    <div class="chip"><span class="ring ring-up"></span> Du sa 👍 nu</div>
    <div class="chip"><span class="ring ring-down"></span> Du sa 👎 nu</div>
  </div>

  <p id="status-line"></p>

  <footer id="vote-footer">
    <span id="vote-count"></span>
    <div class="vote-footer-actions">
      <button type="button" id="export-votes-button" class="link-button">Exportera bedömningar (JSON)</button>
      <button type="button" id="clear-votes-button" class="link-button link-button-danger">Rensa mina bedömningar</button>
    </div>
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"
    integrity="sha384-oiKvfHOCwLd5BVeyS4Zc1WW9KNRFXyXCkijYVrNbvw6BzoPFC+HiHzZi8FlRAvQ3"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/@turf/turf@7.3.5/turf.min.js"
    integrity="sha384-BQF91ViEyKh73QVOKMd0MfkJ7bWbu+o0g448Qfb7aP3HVPItiy/4UZ7OuTCUDKNi"
    crossorigin="anonymous"
  ></script>
  <script type="module" src="src/app.js"></script>
</body>
</html>
